<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body class="bg-light">

    </header>
    <main class="container mt-5">
        <h2 class="text-center fw-bold mb-4">Ultimos Movimientos</h2>

        <section class="card p-4 shadow-sm mb-4">

                <label for="filtro-tipo" class="form-label fw-bold">Filtrar por tipo:</label>
                <select id="filtro-tipo" class="form-select">
                    <option value="todos">Mostrar todos los movimientos</option>

                    <option value="deposito">Depósito</option>
                    <option value="transf">Transferencia recibida</option>

            </div>

            <ul id="lista-mov" class="mt-3 list-group"> 
                <!-- Inyección dinámica con jQuery -->       
            </ul>
        </section>

        <nav class="text-center mt-4">
            <a href="menu.html" class="btn btn-outline-secondary">Volver al Menu Principal</a>
        </nav>

    <footer class="text-center text-muted my-4">

    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
