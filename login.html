<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Alke Wallet - Iniciar Sesión</title>
</head>

<body class="bg-light">

    <header class="text-center my-4">
        <h1 class="text-primary fw-bold">Alke Wallet</h1>
    </header>
    <main class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <section class="card p-4 shadow-sm">
                    <h2 class="text-center h4 mb-4">Iniciar Sesión</h2>
                    <div id="alert-container"></div><!--inyeccion jquery-->
                    <form id="login-form">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email: </label>
                            <input class="form-control" type="email" id="email" placeholder="user@wallet.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="contrasena">Contraseña: </label>
                            <input class="form-control" type="password" id="contrasena" placeholder="1234" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" id="check" type="checkbox" required>
                            <label class="form-check-label" for="check">Acepto los términos y condiciones</label>
                        </div>


                        <button id="boton-enviar" class="btn btn-primary w-100" type="submit">Ingresar</button>


                    </form>
                </section>
            </div>
        </div>
    </main>
    <footer class="text-center text-muted my-4">
        <small>&copy;2026 Alke Wallet. Todos los derechos reservados.</small>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
    <script src="assets/js/login.js"></script>
</body>

</html>
